name: Android Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
      
      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
      
      - name: Create Assets Directory
        run: |
          mkdir -p android/app/src/main/assets
      
      - name: Bundle JavaScript
        run: |
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res
      
      - name: Build Debug APK
        id: build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build-output.log
          if [ $? -ne 0 ]; then
            echo "=== BUILD FAILED ==="
            echo "Last 100 lines of build output:"
            tail -n 100 build-output.log
            exit 1
          fi
          echo "=== Build completed successfully ==="
          echo "Looking for APK files..."
          find . -name "*.apk" -type f
          # Set output for APK path
          APK_PATH=$(find . -name "*debug*.apk" -type f | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nfc-teamup-app-debug
          path: ${{ steps.build.outputs.apk_path }}
          retention-days: 30
          if-no-files-found: error
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
