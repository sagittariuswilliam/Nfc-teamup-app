name: Android Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Fix react-native-reanimated version
        run: |
          # Fix reanimated version for RN 0.73.6 compatibility
          sed -i 's/"react-native-reanimated": "[^"]*"/"react-native-reanimated": "~3.6.0"/' package.json
          echo "Fixed package.json:"
          grep reanimated package.json

      - name: Install Dependencies
        run: |
          cd android
          chmod +x gradlew
          # Download gradle wrapper first
          ./gradlew --version
          cd ..
          npm install --legacy-peer-deps

      - name: Create Assets Directory and Bundle JS
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res
          echo "JS Bundle created"
          ls -la android/app/src/main/assets/

      - name: Build Debug APK
        id: build
        run: |
          cd android
          echo "=== Starting Gradle Build ==="
          
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build-output.log
          BUILD_EXIT_CODE=$?
          
          echo "build_exit_code=$BUILD_EXIT_CODE" >> $GITHUB_OUTPUT
          
          if [ $BUILD_EXIT_CODE -ne 0 ]; then
            echo "❌ Build failed with exit code $BUILD_EXIT_CODE"
            tail -n 200 build-output.log
            exit 1
          fi
          
          echo "✅ Build succeeded!"
          
          # Find APK
          APK_PATH=$(find app/build/outputs -name "*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No APK found in outputs directory"
            find app/build/outputs -type f 2>/dev/null || echo "outputs directory empty or missing"
            exit 1
          fi
          
          echo "Found APK: $APK_PATH"
          # Use GITHUB_OUTPUT for output
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_basename=$(basename $APK_PATH)" >> $GITHUB_OUTPUT
          
          # Show APK info
          ls -lh "$APK_PATH"
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nfc-teamup-app-debug
          path: ${{ steps.build.outputs.apk_path }}
          retention-days: 30
      
      - name: Build Summary
        run: |
          echo "✅ BUILD SUCCESS!"
          echo "APK: ${{ steps.build.outputs.apk_basename }}"
          echo "Download from: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
