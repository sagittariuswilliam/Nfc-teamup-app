name: Android Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Fix react-native-reanimated version
        run: |
          # Fix reanimated version for RN 0.73.6 compatibility
          sed -i 's/"react-native-reanimated": "[^"]*"/"react-native-reanimated": "~3.6.0"/' package.json
          echo "Fixed package.json:"
          grep reanimated package.json

      - name: Install Dependencies
        run: |
          cd android
          chmod +x gradlew
          # Download gradle wrapper first
          ./gradlew --version
          cd ..
          npm install --legacy-peer-deps

      - name: Create Assets Directory and Bundle JS
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res
          echo "JS Bundle created"
          ls -la android/app/src/main/assets/

      - name: Build Debug APK
        id: build
        continue-on-error: true
        run: |
          cd android
          echo "=== Starting Gradle Build ==="
          echo "Current directory: $(pwd)"
          
          echo "=== Running assembleDebug ==="
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build-output.log
          BUILD_EXIT_CODE=$?
          
          echo "=== Build Exit Code: $BUILD_EXIT_CODE ==="
          echo "build_exit_code=$BUILD_EXIT_CODE" >> $GITHUB_OUTPUT
          
          echo "=== Full build output (last 300 lines) ==="
          tail -n 300 build-output.log
          
          echo "=== Files in outputs directory ==="
          ls -laR app/build/outputs 2>/dev/null || echo "outputs directory missing"
          
          APK_PATH=$(find . -name "*debug*.apk" -type f 2>/dev/null | head -1)
          if [ -n "$APK_PATH" ]; then
            echo "Found APK: $APK_PATH"
            echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          fi
      
      - name: Upload Build Logs (if failed)
        if: steps.buld.outputs.build_exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: android/build-output.log
          retention-days: 7
      
      - name: Upload APK (if success)
        if: steps.build.outputs.build_exit_code == '0'
        uses: actions/upload-artifact@v4
        with:
          name: nfc-teamup-app-debug
          path: ${{ steps.build.outputs.apk_path }}
          retention-days: 30
          if-no-files-found: error
      
      - name: Report Build Status
        run: |
          if [ "${{ steps.build.outputs.build_exit_code }}" != "0" ]; then
            echo "❏ BUILD FAILED"
            echo "Check the 'build-logs' artifact for detailed logs"
            exit 1
          else
            echo "❅ BUILD SUCCESS"
          fi
