name: Android Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Install Dependencies
        run: |
          cd android
          chmod +x gradlew
          # Download gradle wrapper first
          ./gradlew --version
          cd ..
          npm install --legacy-peer-deps
      
      - name: Create Assets Directory and Bundle JS
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res
          echo "JS Bundle created"
          ls -la android/app/src/main/assets/
      
      - name: Build Debug APK
        id: build
        run: |
          cd android
          echo "=== Starting Gradle Build ==="
          echo "Current directory: $(pwd)"
          echo "Files in android/app/build/outputs before build:"
          ls -laR app/build/outputs 2>/dev/null || echo "outputs directory does not exist yet"
          
          echo "=== Running assembleDebug ==="
          ./gradlew assembleDebug --no-daemon --info 2>&1 | tee build-output.log
          BUILD_EXIT_CODE=$?
          
          echo "=== Build Exit Code: $BUILD_EXIT_CODE ==="
          
          if [ $BUILD_EXIT_CODE -ne 0 ]; then
            echo "=== BUILD FAILED ==="
            echo "Last 150 lines of build output:"
            tail -n 150 build-output.log
            exit 1
          fi
          
          echo "=== Build completed, searching for APK ==="
          echo "Files in android/app/build/outputs:"
          ls -laR app/build/outputs 2>/dev/null || echo "outputs directory still missing"
          
          echo "All APK files:"
          find . -name "*.apk" -type f
          
          APK_PATH=$(find . -name "*debug*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No debug APK found!"
            exit 1
          fi
          
          echo "Found APK: $APK_PATH"
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_name=$(basename $APK_PATH)" >> $GITHUB_OUTPUT
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nfc-teamup-app-debug
          path: ${{ steps.build.outputs.apk_path }}
          retention-days: 30
          if-no-files-found: error
